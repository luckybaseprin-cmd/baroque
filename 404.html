<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="google" content="notranslate">
<meta name="description" content="Error 404 en Baroque Disco Pub. Vuelve a la portada y sigue la fiesta.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#1a0a2e">
<title>404 | Baroque Disco Pub</title>
<link rel="icon" type="image/png" href="baorque3dd.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-deep: #1a0a2e;
    --purple-mid: #3b1f6e;
    --purple-vivid: #7c3aed;
    --purple-bright: #a855f7;
    --purple-glow: #c084fc;
    --gold: #f5c842;
    --white: #faf5ff;
    --text-muted: rgba(250, 245, 255, 0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100svh;
    overflow: hidden;
    color: var(--white);
    font-family: "DM Sans", sans-serif;
    background:
      radial-gradient(circle at 14% 12%, rgba(124, 58, 237, 0.34), transparent 28%),
      radial-gradient(circle at 88% 20%, rgba(245, 200, 66, 0.18), transparent 22%),
      radial-gradient(circle at 52% 82%, rgba(168, 85, 247, 0.22), transparent 34%),
      linear-gradient(180deg, #140823 0%, var(--purple-deep) 56%, #12071f 100%);
    position: relative;
    isolation: isolate;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.45;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  }

  .page {
    position: relative;
    z-index: 5;
    width: min(860px, calc(100% - 2rem));
    margin: 0 auto;
    min-height: 100svh;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 2rem 0 8.2rem;
  }

  .brand {
    position: fixed;
    top: max(0.8rem, calc(env(safe-area-inset-top) + 0.3rem));
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .brand img {
    width: clamp(86px, 16vw, 128px);
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.3));
  }

  .card {
    width: 100%;
    border-radius: 28px;
    padding: clamp(1.3rem, 4vw, 2.1rem);
    background:
      linear-gradient(180deg, rgba(250, 245, 255, 0.1), rgba(250, 245, 255, 0.03)),
      rgba(26, 10, 46, 0.72);
    border: 1px solid rgba(168, 85, 247, 0.34);
    box-shadow:
      0 26px 68px rgba(0, 0, 0, 0.44),
      inset 0 0 0 1px rgba(250, 245, 255, 0.06);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .kicker {
    margin-bottom: 0.7rem;
    color: rgba(245, 200, 66, 0.95);
    font-size: 0.7rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }

  h1 {
    font-family: "Playfair Display", serif;
    font-size: clamp(3.2rem, 13vw, 8.2rem);
    line-height: 0.92;
    letter-spacing: -0.03em;
    margin-bottom: 0.8rem;
    background: linear-gradient(135deg, var(--white) 20%, var(--purple-glow) 55%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h2 {
    font-family: "Playfair Display", serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 700;
    color: #f3e8ff;
    margin-bottom: 0.8rem;
  }

  p {
    max-width: 620px;
    margin: 0 auto;
    color: var(--text-muted);
    line-height: 1.78;
    font-size: clamp(0.95rem, 2.3vw, 1.06rem);
  }

  .actions {
    margin-top: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 0.72rem 1.15rem;
    border-radius: 999px;
    font-size: 0.73rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid rgba(250, 245, 255, 0.2);
    color: var(--white);
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }

  .btn-primary {
    border: 0;
    background: linear-gradient(135deg, var(--purple-vivid), var(--purple-bright));
    box-shadow: 0 10px 28px rgba(124, 58, 237, 0.38);
  }

  .btn-secondary {
    background: rgba(250, 245, 255, 0.06);
  }

  .btn:hover {
    transform: translateY(-2px);
    border-color: rgba(245, 200, 66, 0.45);
  }

  .light-beam {
    position: fixed;
    top: -18%;
    width: 34vw;
    height: 130%;
    filter: blur(5px);
    opacity: 0.3;
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 2;
  }

  .beam-left {
    left: -5%;
    background: linear-gradient(to bottom, rgba(34, 211, 238, 0.34), rgba(34, 211, 238, 0.03), transparent);
    clip-path: polygon(45% 0%, 62% 0%, 100% 100%, 12% 100%);
    animation: beamLeft 7.2s ease-in-out infinite;
  }

  .beam-right {
    right: -8%;
    background: linear-gradient(to bottom, rgba(236, 72, 153, 0.34), rgba(236, 72, 153, 0.05), transparent);
    clip-path: polygon(38% 0%, 54% 0%, 94% 100%, 2% 100%);
    animation: beamRight 6.7s ease-in-out infinite;
  }

  .equalizer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 86px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0.34rem;
    padding: 0 1rem calc(0.7rem + env(safe-area-inset-bottom));
    pointer-events: none;
    z-index: 4;
  }

  .eq-bar {
    width: 8px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(245, 200, 66, 0.95), rgba(168, 85, 247, 0.9));
    box-shadow: 0 0 14px rgba(168, 85, 247, 0.35);
    animation: barJump var(--bar-duration) ease-in-out infinite;
    animation-delay: var(--bar-delay);
  }

  .eq-bar:nth-child(1)  { --bar-duration: 1.1s; --bar-delay: -0.2s; height: 20px; }
  .eq-bar:nth-child(2)  { --bar-duration: 0.9s; --bar-delay: -0.4s; height: 30px; }
  .eq-bar:nth-child(3)  { --bar-duration: 1.2s; --bar-delay: -0.8s; height: 24px; }
  .eq-bar:nth-child(4)  { --bar-duration: 1s;   --bar-delay: -0.5s; height: 36px; }
  .eq-bar:nth-child(5)  { --bar-duration: 1.3s; --bar-delay: -0.7s; height: 26px; }
  .eq-bar:nth-child(6)  { --bar-duration: 1.05s;--bar-delay: -0.3s; height: 40px; }
  .eq-bar:nth-child(7)  { --bar-duration: 0.95s;--bar-delay: -0.6s; height: 28px; }
  .eq-bar:nth-child(8)  { --bar-duration: 1.2s; --bar-delay: -0.9s; height: 34px; }
  .eq-bar:nth-child(9)  { --bar-duration: 1.1s; --bar-delay: -0.2s; height: 22px; }
  .eq-bar:nth-child(10) { --bar-duration: 1.25s;--bar-delay: -0.75s;height: 38px; }
  .eq-bar:nth-child(11) { --bar-duration: 0.92s;--bar-delay: -0.45s;height: 25px; }
  .eq-bar:nth-child(12) { --bar-duration: 1.15s;--bar-delay: -0.65s;height: 32px; }

  @keyframes beamLeft {
    0%, 100% { transform: rotate(-30deg) translateX(0); }
    50% { transform: rotate(-12deg) translateX(2.5vw); }
  }

  @keyframes beamRight {
    0%, 100% { transform: rotate(30deg) translateX(0); }
    50% { transform: rotate(14deg) translateX(-2.5vw); }
  }

  @keyframes barJump {
    0%, 100% { transform: scaleY(0.45); opacity: 0.7; }
    50% { transform: scaleY(1.1); opacity: 1; }
  }

  @media (max-width: 640px) {
    .page { width: calc(100% - 1rem); padding-top: 5rem; }
    .card { border-radius: 22px; padding: 1.15rem 1rem 1.35rem; }
    .actions {
      width: 100%;
      flex-direction: column;
      align-items: stretch;
    }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<a class="brand" href="index.html" aria-label="Volver a Baroque Disco Pub">
  <img src="baorque3dd.png" alt="Baroque Disco Pub">
</a>

<div class="light-beam beam-left" aria-hidden="true"></div>
<div class="light-beam beam-right" aria-hidden="true"></div>

<main class="page">
  <section class="card">
    <p class="kicker">Error de pista</p>
    <h1>404</h1>
    <h2>Esta pagina se fue de fiesta</h2>
    <p>No encontramos esta URL, pero la noche sigue encendida. Vuelve al inicio o entra directo a carteles para ver los eventos de Baroque.</p>
    <div class="actions">
      <a class="btn btn-primary" href="index.html">Volver al inicio</a>
      <a class="btn btn-secondary" href="carteles.html">Ver carteles</a>
    </div>
  </section>
</main>

<div class="equalizer" aria-hidden="true">
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
  <span class="eq-bar"></span>
</div>
</body>
</html>
